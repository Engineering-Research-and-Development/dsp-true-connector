# ?????????????????????????????????????????????????????????????????????????????
# Base configuration for Holder+Verifier ? shared across all environments.
# Hostname-specific overrides live in:
#   application-holderverifier-spring.properties  (Spring / localhost)
#   application-holderverifier-docker.properties  (Docker / container hostnames)
# ?????????????????????????????????????????????????????????????????????????????
server.port=8081
server.ssl.enabled=false

# MongoDB configuration (overridden per-environment)
spring.data.mongodb.authentication-database=admin
spring.data.mongodb.database=holder_verifier_test

# Keystore
dcp.keystore.path=classpath:eckey.p12
dcp.keystore.password=password
dcp.keystore.alias=dsptrueconnector

# Endpoint Configuration
dcp.auto-register-path-endpoints=true
dcp.enable-legacy-endpoints=true

# DID Document Service Entries
dcp.service-entries[0].id=TRUEConnector-Credential-Service
dcp.service-entries[0].type=CredentialService
dcp.service-entries[0].endpoint-path=/dcp

# Issuer Configuration
dcp.issuer.type=IssuerService

# Verifiable Presentation Configuration
dcp.vp.enabled=true
dcp.vp.use-dcp-compliant=true
dcp.vp.scope=MembershipCredential

# Logging
logging.level.it.eng.dcp=DEBUG
logging.level.org.springframework.test=INFO
