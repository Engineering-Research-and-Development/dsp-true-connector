# Test configuration for E2E tests
server.port=8081
server.ssl.enabled=false

# MongoDB configuration (will be overridden by TestContainers)
spring.data.mongodb.authentication-database=admin
spring.data.mongodb.database=holder_verifier_test

## DCP Configuration
# Core DCP Connector Identity
dcp.connector-did=did:web:localhost%3A8081:holder
dcp.connector-did-verifier=did:web:localhost%3A8081:verifier
dcp.base-url=http://localhost:8081
dcp.host=localhost
dcp.keystore.path=eckey.p12
dcp.keystore.password=password
dcp.keystore.alias=dsptrueconnector

# Endpoint Configuration
dcp.auto-register-path-endpoints=true
dcp.enable-legacy-endpoints=true

# Service Endpoints Configuration
dcp.service.credential.endpoint=/dcp/credentials
dcp.service.credential.type=CredentialService

# Issuer Configuration (not used by holder/verifier, but required by config)
dcp.issuer.location=http://localhost:8082/issuer/credentials
dcp.issuer.type=IssuerService

# Verifiable Presentation Configuration
dcp.vp.enabled=true
dcp.vp.use-dcp-compliant=true
dcp.vp.scope=MembershipCredential

# Trusted Issuers Configuration
dcp.trusted-issuers.MembershipCredential=did:web:localhost:8080,did:web:localhost:8090
dcp.trusted-issuers.VerifiableCredential=did:web:localhost:8080,did:web:localhost:8090

# Logging
logging.level.it.eng.dcp=DEBUG
logging.level.org.springframework.test=INFO
