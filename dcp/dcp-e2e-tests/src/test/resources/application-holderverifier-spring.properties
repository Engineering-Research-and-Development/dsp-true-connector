# -----------------------------------------------------------------------------
# Spring environment overrides - holderverifier runs on localhost.
# Active when spring.profiles.active includes "holderverifier-spring".
# -----------------------------------------------------------------------------
# Identity (localhost)
dcp.connector-did=did:web:localhost%3A8081:holder
dcp.connector-did-verifier=did:web:localhost%3A8081:verifier
dcp.base-url=http://localhost:8081
dcp.host=localhost
# Issuer location - issuer runs on localhost:8082 in Spring mode
dcp.issuer.location=http://localhost:8082/issuer/credentials
# Trusted Issuers
dcp.trusted-issuers.MembershipCredential=did:web:localhost%3A8082:issuer
dcp.trusted-issuers.VerifiableCredential=did:web:localhost%3A8082:issuer