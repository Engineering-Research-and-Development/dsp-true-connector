# Testcontainers Configuration for Windows Docker Desktop
# This file configures Testcontainers to properly connect to Docker on Windows

# Important: Ensure Docker Desktop is running and accessible
# Verify with: docker ps

# Disable reuse to ensure clean test runs
testcontainers.reuse.enable=false

# Ryuk container for resource cleanup - use the latest stable version
ryuk.container.image=testcontainers/ryuk:0.13.0

# Disable Docker host detection checks that may interfere
checks.disable=true

# Use Npipe socket for Windows Docker Desktop
docker.client.strategy=org.testcontainers.dockerclient.NpipeSocketClientProviderStrategy

# Reduce startup timeout sensitivity
testcontainers.pull.pause.timeout=60

