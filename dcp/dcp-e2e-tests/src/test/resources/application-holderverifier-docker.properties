# -----------------------------------------------------------------------------
# Docker environment overrides - holderverifier runs under container hostname.
# Active when spring.profiles.active includes "holderverifier-docker".
# -----------------------------------------------------------------------------
# Identity (container hostname)
dcp.connector-did=did:web:holderverifier%3A8081:holder
dcp.connector-did-verifier=did:web:holderverifier%3A8081:verifier
dcp.base-url=http://holderverifier:8081
dcp.host=holderverifier
# Issuer location - issuer runs under container hostname
dcp.issuer.location=http://issuer:8082/issuer/credentials
# Trusted Issuers
dcp.trusted-issuers.MembershipCredential=did:web:issuer%3A8082:issuer
dcp.trusted-issuers.VerifiableCredential=did:web:issuer%3A8082:issuer

spring.data.mongodb.host=mongodb
dcp.keystore.path=/app/eckey.p12