# -----------------------------------------------------------------------------
# Spring environment overrides - issuer runs on localhost.
# Active when spring.profiles.active includes "issuer-spring".
# -----------------------------------------------------------------------------
# Identity (localhost)
dcp.connector-did=did:web:localhost%3A8082:issuer
dcp.base-url=http://localhost:8082
dcp.host=localhost
# DID Document Service Entries - issuer-location uses localhost
dcp.service-entries[0].issuer-location=http://localhost:8082/issuer/