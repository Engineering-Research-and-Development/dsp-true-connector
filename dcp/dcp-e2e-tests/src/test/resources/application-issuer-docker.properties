# -----------------------------------------------------------------------------
# Docker environment overrides - issuer runs under container hostname.
# Active when spring.profiles.active includes "issuer-docker".
# -----------------------------------------------------------------------------
# Identity (container hostname)
dcp.connector-did=did:web:issuer%3A8082:issuer
dcp.base-url=http://issuer:8082
dcp.host=issuer
# DID Document Service Entries - issuer-location uses container hostname
dcp.service-entries[0].issuer-location=http://issuer:8082/issuer/

spring.data.mongodb.host=mongodb
dcp.keystore.path=/app/eckey-issuer.p12