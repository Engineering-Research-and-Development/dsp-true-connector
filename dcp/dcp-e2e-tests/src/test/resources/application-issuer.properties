# ?????????????????????????????????????????????????????????????????????????????
# Base configuration for Issuer ? shared across all environments.
# Hostname-specific overrides live in:
#   application-issuer-spring.properties  (Spring / localhost)
#   application-issuer-docker.properties  (Docker / container hostnames)
# ?????????????????????????????????????????????????????????????????????????????
spring.application.name=dcp-issuer-test
server.port=8082
server.ssl.enabled=false

dcp.clock-skew-seconds=120

# Endpoint Configuration
dcp.auto-register-path-endpoints=true
dcp.enable-legacy-endpoints=true

# Keystore Configuration
dcp.keystore.path=classpath:eckey-issuer.p12
dcp.keystore.password=password
dcp.keystore.alias=dcp-issuer
dcp.keystore.rotation-days=90

# DID Document Service Entries ? IssuerService only
dcp.service-entries[0].id=TRUEConnector-Issuer-Service
dcp.service-entries[0].type=IssuerService

# MongoDB Configuration (host/port overridden per-environment)
spring.data.mongodb.database=issuer_test_db
spring.data.mongodb.authentication-database=admin

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# Logging
logging.level.it.eng.dcp.issuer=INFO
logging.level.org.springframework.test=INFO
