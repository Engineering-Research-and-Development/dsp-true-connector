# Issuer Test Application Configuration
spring.application.name=dcp-issuer-test
server.port=8082

server.ssl.enabled=false

# DCP Configuration
dcp.connector-did=did:web:localhost%3A8082:issuer
dcp.base-url=http://localhost:8082
dcp.host=localhost
dcp.clock-skew-seconds=120

# Endpoint Configuration
dcp.auto-register-path-endpoints=true
dcp.enable-legacy-endpoints=true

# DID Document Service Entries Configuration
dcp.service-entries[0].id=TRUEConnector-Issuer-Service
dcp.service-entries[0].type=IssuerService
dcp.service-entries[0].issuer-location=http://localhost:8082/issuer/

# Keystore Configuration
dcp.keystore.path=eckey-issuer.p12
dcp.keystore.password=password
dcp.keystore.alias=dcp-issuer
dcp.keystore.rotation-days=90

# MongoDB Configuration (will be overridden by TestContainers)
spring.data.mongodb.database=issuer_test_db
spring.data.mongodb.authentication-database=admin

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# Logging
logging.level.it.eng.dcp.issuer=INFO
logging.level.org.springframework.test=INFO
