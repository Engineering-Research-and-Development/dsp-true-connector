server.port=8081

server.ssl.enabled=false

spring.data.mongodb.authentication-database=admin
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=holder_verifier

## DCP Configuration
# Core DCP Connector Identity
dcp.connector-did=did:web:localhost%3A8080:holder
dcp.connector-did-verifier=did:web:localhost%3A8080:verifier
dcp.host=localhost
dcp.keystore.path=eckey.p12
dcp.keystore.password=password
dcp.keystore.alias=dsptrueconnector

# Service Endpoints Configuration
dcp.service.credential.endpoint=/dcp
dcp.service.credential.type=CredentialService

# Issuer Configuration
dcp.issuer.location=htttp://localhost:8084/issuer/credentials
dcp.issuer.type=IssuerService

# Verifiable Presentation Configuration
dcp.vp.enabled=true
dcp.vp.use-dcp-compliant=true
dcp.vp.scope=MembershipCredential

# Trusted Issuers Configuration
# Configure which issuers are trusted for which credential types
# Format: dcp.trusted-issuers.<CredentialType>=<comma-separated list of issuer DIDs>
dcp.trusted-issuers.MembershipCredential=did:web:localhost:8080,did:web:localhost:8090
dcp.trusted-issuers.VerifiableCredential=did:web:localhost:8080,did:web:localhost:8090