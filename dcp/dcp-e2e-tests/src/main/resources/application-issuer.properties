# Application 2 profile - Issuer Application
# Override server port for app2
server.port=8082

# Keystore Configuration
dcp.keystore.path=eckey-issuer.p12
dcp.keystore.password=password
dcp.keystore.alias=dcp-issuer
dcp.keystore.rotation-days=90

# DCP Configuration for Issuer
dcp.connector-did=did:web:localhost%3A8082:issuer
dcp.host=localhost

# MongoDB Configuration (defaults for local runs, overridden by tests)
spring.data.mongodb.authentication-database=admin
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=issuer_test
