name: DCP Integration Tests

on:
  # Trigger on pushes to branches that will never exist (effectively disabled)
  # This keeps the workflow visible in all branches without auto-triggering
  push:
    branches:
      - '__disabled__'  # Branch pattern that will never match
  # Allow manual triggering from any branch via GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: dcp-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CONNECTOR_IMAGE_NAME: engineering-research-and-development/dsp-true-connector
  DCP_ISSUER_IMAGE_NAME: dcp-issuer

jobs:
  build-connector-image:
    name: Build Connector Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean verify --file pom.xml

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Connector Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.CONNECTOR_IMAGE_NAME }}

      - name: Build and push Connector Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./connector
          file: ./connector/Dockerfile
          no-cache: true
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.CONNECTOR_IMAGE_NAME }}:test
          labels: ${{ steps.meta.outputs.labels }}

  build-dcp-issuer-image:
    name: Build DCP Issuer Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build DCP Issuer module with Maven
        run: mvn -B clean package -DskipTests --file dcp/dcp-issuer/pom.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build DCP Issuer Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./dcp/dcp-issuer
          file: ./dcp/dcp-issuer/Dockerfile
          push: false
          tags: ${{ env.DCP_ISSUER_IMAGE_NAME }}:test
          outputs: type=docker,dest=/tmp/dcp-issuer-image.tar

      - name: Upload DCP Issuer Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: dcp-issuer-image
          path: /tmp/dcp-issuer-image.tar
          retention-days: 1

  dcp-integration-tests:
    name: DCP Integration Tests
    needs: [build-connector-image, build-dcp-issuer-image]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download DCP Issuer Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: dcp-issuer-image
          path: /tmp

      - name: Load DCP Issuer Docker image
        run: docker load --input /tmp/dcp-issuer-image.tar

      - name: Verify Docker images
        run: |
          echo "Available Docker images:"
          docker images
          docker inspect ${{ env.DCP_ISSUER_IMAGE_NAME }}:test

      - name: Start Docker Compose services
        run: docker compose -f ./ci/docker/docker-compose-dcp.yml --env-file ./ci/docker/.env up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to start..."
          sleep 45
          echo "Checking service health..."
          docker compose -f ./ci/docker/docker-compose-dcp.yml ps

      - name: Check DCP Issuer health
        run: |
          echo "Checking DCP Issuer health endpoint..."
          for i in {1..10}; do
            if curl -f http://localhost:8084/actuator/health; then
              echo "DCP Issuer is healthy"
              break
            fi
            echo "Attempt $i: DCP Issuer not ready yet, waiting..."
            sleep 5
          done

      - name: Check Connector A health
        run: |
          echo "Checking Connector A health endpoint..."
          for i in {1..10}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Connector A is healthy"
              break
            fi
            echo "Attempt $i: Connector A not ready yet, waiting..."
            sleep 5
          done

      - name: Check Connector B health
        run: |
          echo "Checking Connector B health endpoint..."
          for i in {1..10}; do
            if curl -f http://localhost:8090/actuator/health; then
              echo "Connector B is healthy"
              break
            fi
            echo "Attempt $i: Connector B not ready yet, waiting..."
            sleep 5
          done

      - name: Check running containers
        run: docker ps -a

      # Step 1: Obtain Verifiable Credentials for both connectors (MUST run first)
      - name: Step 1 - Obtain Verifiable Credentials
        uses: matt-ball/newman-action@v2.0.0
        with:
          collection: ./ci/docker/test-cases/dcp-obtain-vc/dcp-gha-tests.postman_collection.json
        continue-on-error: true
        id: obtain-vc-tests

      - name: Check VC obtainment result
        if: steps.obtain-vc-tests.outcome == 'failure'
        run: |
          echo "ERROR: Failed to obtain Verifiable Credentials"
          echo "Cannot proceed with negotiation and data transfer tests without VCs"
          exit 1

      # Step 2: Run Negotiation Tests (requires VCs from Step 1)
      - name: Step 2 - Run Negotiation Tests
        uses: matt-ball/newman-action@v2.0.0
        with:
          collection: ./ci/docker/test-cases/negotiation-api-without-counteroffer-tests/negotiation-api-without-counteroffer-tests.json
        continue-on-error: true
        id: negotiation-tests

      # Step 3: Run Data Transfer Tests (requires VCs from Step 1)
      - name: Step 3 - Run Data Transfer HTTP Pull Tests
        uses: matt-ball/newman-action@v2.0.0
        with:
          collection: ./ci/docker/test-cases/datatransfer-api-http-pull-tests/datatransfer-api-http-pull-tests.json
        continue-on-error: true
        id: datatransfer-tests

      - name: Dump Docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2

      - name: Collect service logs
        if: always()
        run: |
          echo "=== DCP Issuer Logs ==="
          docker logs dcp-issuer || echo "Failed to get dcp-issuer logs"
          echo "=== Connector A Logs ==="
          docker logs connector-a || echo "Failed to get connector-a logs"
          echo "=== Connector B Logs ==="
          docker logs connector-b || echo "Failed to get connector-b logs"
          echo "=== MongoDB Logs ==="
          docker logs mongodb || echo "Failed to get mongodb logs"

      - name: Stop Docker Compose services
        if: always()
        run: docker compose -f ./ci/docker/docker-compose-dcp.yml --env-file ./ci/docker/.env down -v

      - name: Evaluate test results
        if: always()
        run: |
          echo "=== Test Results Summary ==="
          echo "Step 1 - Obtain VCs: ${{ steps.obtain-vc-tests.outcome }}"
          echo "Step 2 - Negotiation Tests: ${{ steps.negotiation-tests.outcome }}"
          echo "Step 3 - Data Transfer Tests: ${{ steps.datatransfer-tests.outcome }}"
          
          # Fail if any test failed
          if [ "${{ steps.obtain-vc-tests.outcome }}" == "failure" ] || \
             [ "${{ steps.negotiation-tests.outcome }}" == "failure" ] || \
             [ "${{ steps.datatransfer-tests.outcome }}" == "failure" ]; then
            echo "ERROR: One or more test stages failed"
            exit 1
          fi
          
          echo "SUCCESS: All test stages passed"

