name: Integration Tests

on:
  push:
    branches: [ "feature/*", "hotfix/*", "fix/*" ]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CONNECTOR_IMAGE_NAME: engineering-research-and-development/dsp-true-connector
  DCP_ISSUER_IMAGE_NAME: dcp-issuer

jobs:
  build-connector-image:
    name: Build Connector Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean verify --file pom.xml

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.CONNECTOR_IMAGE_NAME }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./connector
          file: ./connector/Dockerfile
          no-cache: true
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.CONNECTOR_IMAGE_NAME }}:test
          labels: ${{ steps.meta.outputs.labels }}

  build-dcp-issuer-image:
    name: Build DCP Issuer Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build entire DCP module with Maven
        run: mvn -B clean package -DskipTests --file dcp/pom.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build DCP Issuer Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./dcp/dcp-issuer
          file: ./dcp/dcp-issuer/Dockerfile
          push: false
          tags: ${{ env.DCP_ISSUER_IMAGE_NAME }}:test
          outputs: type=docker,dest=/tmp/dcp-issuer-image.tar

      - name: Upload DCP Issuer Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: dcp-issuer-image
          path: /tmp/dcp-issuer-image.tar
          retention-days: 1

  integration-tests:
    name: ${{ matrix.test-suite }} (${{ matrix.mode }})
    needs: [build-connector-image, build-dcp-issuer-image]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Standard tests (without DCP)
          - test-suite: api-endpoints-tests
            collection: ./ci/docker/test-cases/api-tests/api-endpoints-tests.json
            docker-compose-file: ./ci/docker/docker-compose.yml
            mode: standard
            requires-dcp: false

          - test-suite: dataset-api-tests
            collection: ./ci/docker/test-cases/dataset-api-tests/dataset-api-tests.json
            docker-compose-file: ./ci/docker/docker-compose.yml
            mode: standard
            requires-dcp: false

          - test-suite: connector-tests
            collection: ./ci/docker/test-cases/connector-tests/connector-tests.json
            docker-compose-file: ./ci/docker/docker-compose.yml
            mode: standard
            requires-dcp: false

          # Tests that run in both modes
          - test-suite: negotiation-api-without-counteroffer-tests
            collection: ./ci/docker/test-cases/negotiation-api-without-counteroffer-tests/negotiation-api-without-counteroffer-tests.json
            docker-compose-file: ./ci/docker/docker-compose.yml
            mode: standard
            requires-dcp: false

          - test-suite: negotiation-api-without-counteroffer-tests
            collection: ./ci/docker/test-cases/negotiation-api-without-counteroffer-tests/negotiation-api-without-counteroffer-tests.json
            docker-compose-file: ./ci/docker/docker-compose-dcp.yml
            mode: dcp
            requires-dcp: true
            requires-vc: true

          - test-suite: datatransfer-api-http-pull-tests
            collection: ./ci/docker/test-cases/datatransfer-api-http-pull-tests/datatransfer-api-http-pull-tests.json
            docker-compose-file: ./ci/docker/docker-compose.yml
            mode: standard
            requires-dcp: false

          - test-suite: datatransfer-api-http-pull-tests
            collection: ./ci/docker/test-cases/datatransfer-api-http-pull-tests/datatransfer-api-http-pull-tests.json
            docker-compose-file: ./ci/docker/docker-compose-dcp.yml
            mode: dcp
            requires-dcp: true
            requires-vc: true

          - test-suite: datatransfer-api-http-push-tests
            collection: ./ci/docker/test-cases/datatransfer-api-http-push-tests/datatransfer-api-http-push-tests.json
            docker-compose-file: ./ci/docker/docker-compose.yml
            mode: standard
            requires-dcp: false

          - test-suite: datatransfer-api-http-push-tests
            collection: ./ci/docker/test-cases/datatransfer-api-http-push-tests/datatransfer-api-http-push-tests.json
            docker-compose-file: ./ci/docker/docker-compose-dcp.yml
            mode: dcp
            requires-dcp: true
            requires-vc: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download DCP Issuer Docker image artifact
        if: matrix.requires-dcp == true
        uses: actions/download-artifact@v4
        with:
          name: dcp-issuer-image
          path: /tmp

      - name: Load DCP Issuer Docker image
        if: matrix.requires-dcp == true
        run: docker load --input /tmp/dcp-issuer-image.tar

      - name: Verify DCP Docker image
        if: matrix.requires-dcp == true
        run: |
          echo "Verifying DCP Issuer image..."
          docker images
          docker inspect ${{ env.DCP_ISSUER_IMAGE_NAME }}:test

      - name: Start Docker Compose services
        run: docker compose -f ${{ matrix.docker-compose-file }} --env-file ./ci/docker/.env up -d

      - name: Wait for services to start
        run: sleep 30

      - name: Check if containers are running
        run: docker ps -a

      - name: Check DCP Issuer health
        if: matrix.requires-dcp == true
        run: |
          echo "Checking DCP Issuer health endpoint..."
          for i in {1..10}; do
            if curl -f http://localhost:8084/actuator/health; then
              echo "DCP Issuer is healthy"
              break
            fi
            echo "Attempt $i: DCP Issuer not ready yet, waiting..."
            sleep 5
          done

      - name: Check Connector A health
        if: matrix.requires-dcp == true
        run: |
          echo "Checking Connector A health endpoint..."
          for i in {1..10}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Connector A is healthy"
              break
            fi
            echo "Attempt $i: Connector A not ready yet, waiting..."
            sleep 5
          done

      - name: Check Connector B health
        if: matrix.requires-dcp == true
        run: |
          echo "Checking Connector B health endpoint..."
          for i in {1..10}; do
            if curl -f http://localhost:8090/actuator/health; then
              echo "Connector B is healthy"
              break
            fi
            echo "Attempt $i: Connector B not ready yet, waiting..."
            sleep 5
          done

      - name: Obtain Verifiable Credentials (DCP mode only)
        if: matrix.requires-vc == true
        uses: matt-ball/newman-action@v2.0.0
        with:
          collection: ./ci/docker/test-cases/dcp-obtain-vc/dcp-gha-tests.postman_collection.json
        continue-on-error: false

      - name: Run ${{ matrix.test-suite }}
        uses: matt-ball/newman-action@v2.0.0
        with:
          collection: ${{ matrix.collection }}

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2

      - name: Collect service logs
        if: failure()
        run: |
          echo "=== Collecting logs for debugging ==="
          if [ "${{ matrix.requires-dcp }}" == "true" ]; then
            echo "=== DCP Issuer Logs ==="
            docker logs dcp-issuer || echo "Failed to get dcp-issuer logs"
            echo "=== Connector A Logs ==="
            docker logs connector-a || echo "Failed to get connector-a logs"
            echo "=== Connector B Logs ==="
            docker logs connector-b || echo "Failed to get connector-b logs"
          fi
          echo "=== MongoDB Logs ==="
          docker logs mongodb || echo "Failed to get mongodb logs"
          echo "=== MinIO Logs ==="
          docker logs minio || echo "Failed to get minio logs"

      - name: Stop Docker Compose services
        if: always()
        run: docker compose -f ${{ matrix.docker-compose-file }} --env-file ./ci/docker/.env down -v

