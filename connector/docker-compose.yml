services:
  mongodb:
    container_name: mongodb
    image: mongo:7.0.12
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-configdb:/data/configdb
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    #docker.io/bitnami/minio:2025
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      # Enable below line to use custom SSL certificates
#      - ./src/main/resources/certs/minio_certs:/root/.minio/certs:ro
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"

volumes:
  mongodb-data:
  mongodb-configdb:
  minio_data:
