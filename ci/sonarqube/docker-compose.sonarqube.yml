# Local SonarQube stack for DSP True Connector SAST analysis.
#
# Usage:
#   docker compose -f ci/sonarqube/docker-compose.sonarqube.yml up -d
#
# Then open http://localhost:9000 in your browser.
# Default credentials: admin / admin  (you will be prompted to change on first login)
#
# After SonarQube is healthy, run the Maven analysis from the project root:
#   mvn verify sonar:sonar -Psonar -Dsonar.token=<your-token>
#
# See doc/security-analysis/SONARQUBE_LOCAL_SETUP.md for the full guide.

services:
  sonarqube:
    image: sonarqube:community   # Community Edition — free, no time limit
    container_name: sonarqube
    depends_on:
      sonardb:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      # Increase heap for large multi-module projects
      SONAR_WEB_JAVAOPTS: "-Xmx1g -Xms256m"
      SONAR_CE_JAVAOPTS: "-Xmx2g -Xms256m"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  sonardb:
    image: postgres:15-alpine
    container_name: sonardb
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonardb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonardb_data:

