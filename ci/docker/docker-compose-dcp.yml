services:
  ### minio (simulated S3 cloud storage)
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    networks:
      - network-a
      - network-b
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc
    networks:
      - network-a
      - network-b
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/dsp-true-connector-provider --ignore-existing;
      mc mb myminio/dsp-true-connector-consumer --ignore-existing;
      echo 'MinIO buckets created successfully';
      exit 0;
      "

  ### DCP Issuer Service
  dcp-issuer:
    image: dcp-issuer:test
    container_name: dcp-issuer
    networks:
      - network-a
      - network-b
    ports:
      - "8084:8084"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SPRING_APPLICATION_NAME=dcp-issuer
      - SERVER_PORT=8084
      - ISSUER_DID=did:web:dcp-issuer%3A8084:issuer
      - ISSUER_BASE_URL=http://dcp-issuer:8084
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_DATA_MONGODB_DATABASE=issuer_db
      - ISSUER_KEYSTORE_PATH=/cert/eckey-issuer.p12
      - ISSUER_KEYSTORE_PASSWORD=password
      - ISSUER_KEYSTORE_ALIAS=issuer
      # Spring Boot will automatically look for application.properties in /config/ due to classpath
      - SPRING_CONFIG_LOCATION=optional:classpath:/,optional:file:/config/
    volumes:
      # Mount external config directory for application.properties and other config files
      - ./issuer/config:/config
      # Mount external cert directory for .p12 keystores and certificates
      - ./issuer/cert:/cert
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ### connector instance a
  connector-a:
    image: ghcr.io/engineering-research-and-development/dsp-true-connector:test
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "200M"
    networks:
      - network-a
      - network-b
    container_name: connector-a
    ports:
      - "0.0.0.0:8888:2222" #FTP
      - "8080:8080"
    depends_on:
      - mongodb
      - minio
      - dcp-issuer
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - CALLBACK_ADDRESS=${CONNECTOR_A_CALLBACK_ADDRESS}
      - KEYSTORE_NAME=${CONNECTOR_A_KEYSTORE_NAME}
      - KEY_PASSWORD=${CONNECTOR_A_KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${CONNECTOR_A_KEYSTORE_PASSWORD}
      - KEYSTORE_ALIAS=${CONNECTOR_A_KEYSTORE_ALIAS}
      - DAPS_KEYSTORE_NAME=${DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${DAPS_KEYSTORE_ALIAS}
      - TRUSTSTORE_NAME=${TRUSTSTORE_NAME}
      - TRUSTSTORE_PASSWORD=${TRUSTSTORE_PASSWORD}
      - CONNECTOR_A_DCP_ENABLED=true
    volumes:
      - ./connector_a_resources:/config
      - ./tc_cert:/cert
      - ./:/home/nobody/ftp
      - tc_a_log:/var/log/tc

  mongodb:
    container_name: mongodb
    image: mongo:7.0.12
    networks:
      - network-a
      - network-b
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-configdb:/data/configdb
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ### connector instance b
  connector-b:
    image: ghcr.io/engineering-research-and-development/dsp-true-connector:test
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "200M"
    networks:
      - network-a
      - network-b
    container_name: connector-b
    ports:
      - "0.0.0.0:8889:2222" #FTP
      - "8090:8080"
    depends_on:
      - mongodb
      - minio
      - dcp-issuer
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - CALLBACK_ADDRESS=${CONNECTOR_B_CALLBACK_ADDRESS}
      - KEYSTORE_NAME=${CONNECTOR_B_KEYSTORE_NAME}
      - KEY_PASSWORD=${CONNECTOR_B_KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${CONNECTOR_B_KEYSTORE_PASSWORD}
      - KEYSTORE_ALIAS=${CONNECTOR_B_KEYSTORE_ALIAS}
      - DAPS_KEYSTORE_NAME=${DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${DAPS_KEYSTORE_ALIAS}
      - TRUSTSTORE_NAME=${TRUSTSTORE_NAME}
      - TRUSTSTORE_PASSWORD=${TRUSTSTORE_PASSWORD}
      - CONNECTOR_B_DCP_ENABLED=true
    volumes:
      - ./connector_b_resources:/config
      - ./tc_cert:/cert
      - ./:/home/nobody/ftp
      - tc_b_log:/var/log/tc

networks:
  network-a: { }
  network-b: { }

volumes:
  minio_data: { }
  tc_a_log: { }
  mongodb-data: { }
  mongodb-configdb: { }
  tc_b_log: { }

